<svg viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #2d3748; stroke: #4299e1; stroke-width: 2; }
      .start { fill: #48bb78; stroke: #38a169; stroke-width: 2; }
      .end { fill: #f56565; stroke: #c53030; stroke-width: 2; }
      .decision { fill: #ed8936; stroke: #dd6b20; stroke-width: 2; }
      .warning { fill: #d69e2e; stroke: #c05621; stroke-width: 2; }
      .text { fill: #ffffff; font-family: Arial; font-size: 13px; text-anchor: middle; }
      .title { fill: #ffffff; font-family: Arial; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .arrow { stroke: #cbd5e0; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#cbd5e0" />
    </marker>
  </defs>

  <text x="300" y="30" class="title">FLOW 5: BLACKLIST ACTION</text>

  <!-- AI wants to execute -->
  <rect x="100" y="60" width="400" height="60" class="start" rx="10"/>
  <text x="300" y="95" class="text">AI wants to execute action</text>

  <path d="M 300 120 L 300 150" class="arrow"/>

  <!-- Check blacklist -->
  <polygon points="300,150 400,200 300,250 200,200" class="decision"/>
  <text x="300" y="205" class="text">Is action</text>
  <text x="300" y="220" class="text">blacklisted?</text>

  <!-- Not blacklisted - execute -->
  <path d="M 400 200 L 500 200 L 500 60 L 500 60" class="arrow"/>
  <text x="450" y="190" class="text">No</text>
  <rect x="450" y="30" width="100" height="60" class="box" rx="5"/>
  <text x="500" y="65" class="text">Execute</text>

  <!-- Blacklisted - warn -->
  <path d="M 300 250 L 300 280" class="arrow"/>
  <text x="330" y="270" class="text">Yes</text>

  <!-- Display warning -->
  <rect x="100" y="280" width="400" height="80" class="warning" rx="5"/>
  <text x="300" y="305" class="text">Display: "⚠ WARNING:"</text>
  <text x="300" y="325" class="text">"Blacklisted action detected"</text>
  <text x="300" y="345" class="text">"Action: [file deletion]"</text>

  <path d="M 300 360 L 300 390" class="arrow"/>

  <!-- Ask permission -->
  <rect x="100" y="390" width="400" height="60" class="box" rx="5"/>
  <text x="300" y="415" class="text">Display: "Proceed? (y/n)"</text>

  <path d="M 300 450 L 300 480" class="arrow"/>

  <!-- User decision -->
  <polygon points="300,480 400,530 300,580 200,530" class="decision"/>
  <text x="300" y="535" class="text">User</text>
  <text x="300" y="550" class="text">approves?</text>

  <!-- Yes - execute with approval -->
  <path d="M 400 530 L 500 530" class="arrow"/>
  <text x="450" y="520" class="text">Yes</text>
  <rect x="450" y="500" width="100" height="60" class="box" rx="5"/>
  <text x="500" y="525" class="text">Execute</text>
  <text x="500" y="545" class="text">+ Log</text>

  <!-- No - skip -->
  <path d="M 300 580 L 300 610" class="arrow"/>
  <text x="330" y="600" class="text">No</text>

  <!-- Skip action -->
  <rect x="100" y="610" width="400" height="60" class="box" rx="5"/>
  <text x="300" y="635" class="text">Display: "Action skipped"</text>
  <text x="300" y="655" class="text">"Continue task? (y/n)"</text>

  <path d="M 300 670 L 300 700" class="arrow"/>

  <!-- Continue or abort -->
  <polygon points="300,700 400,750 300,800 200,750" class="decision"/>
  <text x="300" y="755" class="text">Continue?</text>

  <!-- Continue task -->
  <path d="M 200 750 L 50 750 L 50 100 L 100 100" class="arrow"/>
  <text x="120" y="745" class="text">Yes</text>

  <!-- Abort task -->
  <path d="M 300 800 L 300 830" class="arrow"/>
  <text x="330" y="820" class="text">No</text>

  <!-- End -->
  <rect x="100" y="830" width="400" height="60" class="end" rx="10"/>
  <text x="300" y="855" class="text">Task aborted</text>
  <text x="300" y="875" class="text">Return to: "What do you need?"</text>
</svg>
